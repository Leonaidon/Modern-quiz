<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <title>Квиз — TWA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
            },
            colors: {
              surface: '#12141c',
              card: '#1a1d28',
              accent: '#a78bfa',
              accent2: '#22d3ee',
            },
            boxShadow: {
              glow: '0 0 40px -10px rgba(167, 139, 250, 0.35)',
              glow2: '0 0 32px -8px rgba(34, 211, 238, 0.25)',
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="min-h-screen bg-surface font-sans text-slate-100 antialiased selection:bg-violet-500/30">
    <div id="app" class="mx-auto flex min-h-screen max-w-lg flex-col px-4 pb-10 pt-6">
      <header class="mb-8 flex flex-col gap-1">
        <p class="text-xs font-medium uppercase tracking-[0.2em] text-violet-300/80">Мини-квиз</p>
        <h1 class="text-2xl font-bold tracking-tight text-white">Тесты в Telegram</h1>
        <p class="text-sm text-slate-400">Официальные подборки, сообщество и свой конструктор.</p>
      </header>

      <nav
        class="mb-6 flex rounded-2xl border border-white/5 bg-card/80 p-1 shadow-inner backdrop-blur-sm"
        role="tablist"
        aria-label="Разделы"
      >
        <button
          type="button"
          data-tab="official"
          class="tab-btn flex-1 rounded-xl px-3 py-2.5 text-sm font-semibold transition-all"
        >
          Официальные
        </button>
        <button
          type="button"
          data-tab="community"
          class="tab-btn flex-1 rounded-xl px-3 py-2.5 text-sm font-semibold transition-all"
        >
          Сообщество
        </button>
        <button
          type="button"
          data-tab="create"
          class="tab-btn flex-1 rounded-xl px-3 py-2.5 text-sm font-semibold transition-all"
        >
          Создать
        </button>
      </nav>

      <!-- Официальные -->
      <section id="panel-official" class="tab-panel hidden flex-1 flex-col gap-4" data-panel="official">
        <div id="official-list" class="flex flex-col gap-3"></div>
      </section>

      <!-- Сообщество -->
      <section id="panel-community" class="tab-panel hidden flex-1 flex-col gap-4" data-panel="community">
        <div id="community-list" class="flex flex-col gap-3"></div>
      </section>

      <!-- Создать -->
      <section id="panel-create" class="tab-panel hidden flex-1 flex-col gap-5" data-panel="create">
        <form id="create-form" class="flex flex-col gap-5">
          <div class="rounded-2xl border border-white/5 bg-card p-5 shadow-glow">
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Название теста</label>
            <input
              name="title"
              required
              maxlength="120"
              placeholder="Например: Какое ты животное?"
              class="w-full rounded-xl border border-white/10 bg-surface px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:border-violet-400/50 focus:outline-none focus:ring-2 focus:ring-violet-500/20"
            />
          </div>
          <div class="rounded-2xl border border-white/5 bg-card p-5 shadow-glow2">
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">Описание</label>
            <textarea
              name="description"
              rows="3"
              maxlength="500"
              placeholder="Кратко опишите идею теста…"
              class="w-full resize-none rounded-xl border border-white/10 bg-surface px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:border-cyan-400/50 focus:outline-none focus:ring-2 focus:ring-cyan-500/20"
            ></textarea>
          </div>

          <div class="rounded-2xl border border-white/5 bg-card p-5">
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-400">
              Тексты результатов (по строкам: <span class="font-mono text-cyan-300/90">ключ | текст</span>)
            </label>
            <textarea
              id="result-texts"
              name="resultTexts"
              rows="4"
              placeholder="крокодил | Вы — дерзкий хищник&#10;кошка | Вы — уют и самостоятельность"
              class="w-full resize-y rounded-xl border border-white/10 bg-surface px-4 py-3 font-mono text-xs text-slate-200 placeholder:text-slate-500 focus:border-violet-400/50 focus:outline-none focus:ring-2 focus:ring-violet-500/20"
            ></textarea>
            <p class="mt-2 text-xs text-slate-500">Необязательно: если пусто — покажем имя переменной-победителя.</p>
          </div>

          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold text-white">Вопросы</h2>
            <button
              type="button"
              id="add-question"
              class="rounded-xl bg-gradient-to-r from-violet-500/90 to-cyan-500/80 px-4 py-2 text-sm font-semibold text-white shadow-glow transition hover:opacity-95 active:scale-[0.98]"
            >
              + Вопрос
            </button>
          </div>

          <div id="questions-container" class="flex flex-col gap-4"></div>

          <div class="flex flex-col gap-3 sm:flex-row">
            <button
              type="submit"
              class="flex-1 rounded-2xl bg-white px-5 py-3.5 text-sm font-bold text-surface shadow-lg transition hover:bg-slate-100 active:scale-[0.99]"
            >
              Сохранить в «Сообщество»
            </button>
            <button
              type="button"
              id="export-json"
              class="rounded-2xl border border-white/15 px-5 py-3.5 text-sm font-semibold text-slate-200 transition hover:border-white/25 hover:bg-white/5"
            >
              Экспорт JSON
            </button>
          </div>
          <p id="create-feedback" class="hidden text-center text-sm text-emerald-400"></p>
        </form>
      </section>
    </div>

    <!-- Экран прохождения -->
    <div
      id="play-overlay"
      class="fixed inset-0 z-50 hidden flex-col bg-surface/95 backdrop-blur-md"
      aria-hidden="true"
    >
      <div class="mx-auto flex h-full w-full max-w-lg flex-col px-4 pb-8 pt-6">
        <div class="mb-4 flex items-center justify-between">
          <button
            type="button"
            id="play-close"
            class="rounded-xl border border-white/10 px-3 py-2 text-sm text-slate-300 hover:bg-white/5"
          >
            Закрыть
          </button>
          <span id="play-progress" class="text-xs font-medium text-slate-500"></span>
        </div>
        <div id="play-content" class="flex flex-1 flex-col"></div>
      </div>
    </div>

    <template id="tpl-question-block">
      <div class="question-block rounded-2xl border border-white/5 bg-card p-5 shadow-inner">
        <div class="mb-3 flex items-start justify-between gap-2">
          <span class="question-index text-xs font-bold uppercase tracking-wider text-violet-300"></span>
          <button
            type="button"
            class="remove-question text-xs text-slate-500 hover:text-rose-400"
            title="Удалить вопрос"
          >
            Удалить
          </button>
        </div>
        <label class="mb-2 block text-xs text-slate-400">Текст вопроса</label>
        <textarea
          class="q-text mb-4 w-full resize-y rounded-xl border border-white/10 bg-surface px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:border-violet-400/40 focus:outline-none focus:ring-1 focus:ring-violet-500/30"
          rows="2"
          placeholder="Ваш вопрос…"
          required
        ></textarea>
        <p class="mb-2 text-xs font-semibold text-slate-400">Ответы (до 8)</p>
        <div class="answers-wrap flex flex-col gap-3"></div>
        <button
          type="button"
          class="add-answer mt-3 w-full rounded-xl border border-dashed border-white/15 py-2 text-xs font-medium text-slate-400 hover:border-violet-400/40 hover:text-violet-200"
        >
          + Ответ
        </button>
      </div>
    </template>

    <template id="tpl-answer-row">
      <div class="answer-row rounded-xl border border-white/5 bg-surface/80 p-3">
        <div class="mb-2 flex gap-2">
          <input
            type="text"
            class="a-text flex-1 rounded-lg border border-white/10 bg-card px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:border-cyan-400/40 focus:outline-none"
            placeholder="Текст ответа"
            required
          />
        </div>
        <label class="mb-1 block text-[10px] uppercase tracking-wide text-slate-500">Баллы к результатам</label>
        <input
          type="text"
          class="a-scores w-full rounded-lg border border-white/10 bg-card px-3 py-2 font-mono text-xs text-cyan-100/90 placeholder:text-slate-600 focus:border-violet-400/40 focus:outline-none"
          placeholder='крокодил:+5, кошка:-2  или  {"крокодил":5,"кошка":-2}'
        />
      </div>
    </template>

    <script src="js/app.js" type="module"></script>
  </body>
</html>
